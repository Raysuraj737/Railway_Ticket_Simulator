<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cancellation History</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 30px;
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
      }

      table {
        width: 100%;
        max-width: 1000px;
        margin: auto;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      th,
      td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #1f3c88;
        color: white;
      }

      tr:hover {
        background: #f1f5ff;
      }

      .back-btn {
        display: block;
        margin: 25px auto;
        width: fit-content;
        text-decoration: none;
        background: #1f3c88;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Cancellation History</h1>

    <table>
      <thead>
        <tr>
          <th>Passenger ID</th>
          <th>Age</th>
          <th>Name</th>
          <th>From</th>
          <th>To</th>
          <th>Class</th>
          <th>Status</th>
          <th>Cancelled On</th>
        </tr>
      </thead>

      <tbody>
        {% for row in history %}
        <tr>
          <td>{{ row[0] }}</td>
          <td>{{ row[1] }}</td>
          <td>{{ row[2] }}</td>
          <td>{{ row[3] }}</td>
          <td>{{ row[4] }}</td>
          <td>{{ row[5] }}</td>
          <td>{{ row[6] }}</td>
          <td>{{ row[7] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{{ url_for('index') }}" class="back-btn">← Back to Home</a>
  </body>
</html>
